name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle (direct, no wrapper)
        run: |
          # Ubuntu 24.04 has Gradle pre-installed
          gradle assembleDebug --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_androidUseAndroidX: "true"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PuppyAdoptApp-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
